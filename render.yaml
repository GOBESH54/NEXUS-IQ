services:
  # ── Backend Web Service (FastAPI) ──────────────────────────────────────────
  - type: web
    name: nexus-iq-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./nexus_iq.db

  # ── Frontend Web Service (Next.js) ─────────────────────────────────────────
  - type: web
    name: nexus-iq-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: NEXT_PUBLIC_API_URL
        value: https://nexus-iq-by8e.onrender.com/api
